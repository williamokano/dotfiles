set-option -sa terminal-overrides ",xterm*:Tc"
set -g mouse on

# Set Prefix
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# Shift Alt vim keys to switch windows
bind -n C-S-Left previous-window
bind -n C-S-Right next-window

# Start windows and panes at 1, not 0...
set -g base-index 1
set -g pane-base-index 1
set-window-option -g pane-base-index 1
set-option -g renumber-windows on

# Prevent running commands from overwriting window names
set-option -g automatic-rename off

# Rename the current window via the inline prompt, but hide status-right (the
# session/git/clock block) while the prompt is open so it doesn't show through.
# tmux 3.7 exposes no prompt-active flag and no command-prompt hook, so we
# snapshot status-right into @sr_saved (only while it's non-empty, so a
# cancelled rename can't corrupt the snapshot), blank it, and restore it when
# the rename is accepted. NOTE: cancelling with Escape leaves status-right
# hidden until the next accepted rename (no cancel hook exists) -- just press
# prefix+, then Enter to bring it back.
bind , {
  if-shell -F "#{status-right}" 'set -Fg @sr_saved "#{status-right}"'
  set -g status-right ""
  command-prompt -I "#W" { rename-window -- '%%' ; set -Fg status-right "#{@sr_saved}" }
}

# tmux continuum and resurrect
set -g @resurrect-capture-pane-contents 'on'
set -g @continuum-restore 'on'

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @catppuccin_date_time "%Y-%m-%d %H:%M"
set -g @plugin 'williamokano/catppuccin-tmux'
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# set vi-mode
set-window-option -g mode-keys vi

# key bindings
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel

# Synchronize panes shortcut
bind-key X set-window-option synchronize-panes\; display-message "synchronize-panes is now #{?pane_synchronized,on,off}"

# Keep current CWD
# It's easier to mode to home by just cd anyway
bind '"' split-window -v -c "#{pane_current_path}"
bind % split-window -h -c "#{pane_current_path}"

#bind-key -n M-f send-prefix \; send-keys M-f
#bind-key -n M-b send-prefix \; send-keys M-b
#bind-key -n M-d send-prefix \; send-keys M-d
#bind-key -n M-Backspace send-prefix \; send-prefix M-Backspace

run '~/.tmux/plugins/tpm/tpm'
